<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nikki Info - Vietnam Version</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ngôi Sao Thời Trang - Phối Đồ Cá Nhân</h1>
            <p>Dữ liệu kết nối trực tiếp từ Google Sheets của bạn</p>
        </header>

        <section class="inventory-section">
            <h2>1. Cập Nhật Kho Đồ (Inventory)</h2>
            <div id="category-tabs" class="tabs-container">
                </div>
            <div id="item-lists" class="items-grid">
                <p style="text-align:center; padding:20px;">Đang tải dữ liệu từ Sheets...</p>
            </div>
            <button class="btn-save" onclick="saveInventory()">LƯU KHO ĐỒ CỦA TÔI</button>
        </section>

        <section class="calc-section">
            <h2>2. Gợi Ý Vượt Ải Tối ƯU</h2>
            <div class="weights-grid">
                <label>Simple: <input type="number" id="w-simple" value="1.5" step="0.1"></label>
                <label>Pure: <input type="number" id="w-pure" value="1.5" step="0.1"></label>
                <label>Elegant: <input type="number" id="w-elegance" value="1.0" step="0.1"></label>
                <label>Cool: <input type="number" id="w-cool" value="1.0" step="0.1"></label>
                <label>Mature: <input type="number" id="w-mature" value="0.5" step="0.1"></label>
            </div>
            <button class="btn-calc" onclick="suggestBestOutfit()">TÌM ĐỒ MẠNH NHẤT TRONG KHO</button>
            
            <div id="result-box" class="result-container" style="display:none;">
                <h3>Set đồ gợi ý cho bạn:</h3>
                <ul id="suggestion-list"></ul>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
